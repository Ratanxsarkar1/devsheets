<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Git Cheatsheet — Master the Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #10131a;
    --surface2: #171b26;
    --border: #1e2535;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #a8ff78;
    --text: #e2e8f0;
    --muted: #64748b;
    --code-bg: #0d1117;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .orb-1 { width:600px; height:600px; background:rgba(0,229,255,0.04); top:-200px; left:-200px; }
  .orb-2 { width:500px; height:500px; background:rgba(168,85,247,0.04); bottom:-200px; right:-100px; }

  /* Header */
  header {
    position:relative; z-index:10;
    padding:60px 24px 40px; text-align:center;
    border-bottom:1px solid var(--border);
  }
  .header-badge {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(0,229,255,0.08); border:1px solid rgba(0,229,255,0.2);
    border-radius:100px; padding:6px 16px;
    font-family:'JetBrains Mono',monospace; font-size:11px;
    color:var(--accent); letter-spacing:0.1em; text-transform:uppercase;
    margin-bottom:24px;
  }
  .header-badge::before {
    content:''; width:6px; height:6px; border-radius:50%;
    background:var(--accent); animation:pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{ opacity:1; transform:scale(1); }
    50%    { opacity:.4; transform:scale(.8); }
  }
  h1 { font-size:clamp(36px,6vw,72px); font-weight:800; line-height:1; letter-spacing:-0.03em; margin-bottom:16px; }
  h1 span.git { color:var(--accent); }
  h1 span.cmd { color:var(--accent2); }
  .subtitle { font-family:'JetBrains Mono',monospace; font-size:14px; color:var(--muted); letter-spacing:0.02em; max-width:500px; margin:0 auto; }

  .stats-bar { display:flex; justify-content:center; gap:40px; flex-wrap:wrap; margin-top:36px; padding-top:36px; border-top:1px solid var(--border); }
  .stat { text-align:center; }
  .stat-num { font-size:28px; font-weight:800; color:var(--accent); line-height:1; font-family:'JetBrains Mono',monospace; }
  .stat-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-top:4px; }

  /* Main */
  main { position:relative; z-index:10; max-width:1200px; margin:0 auto; padding:40px 24px 80px; }

  /* Search */
  .search-wrap { position:relative; margin-bottom:40px; }
  .search-icon { position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:16px; pointer-events:none; }
  #search {
    width:100%; background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:16px 16px 16px 48px; font-family:'JetBrains Mono',monospace; font-size:14px;
    color:var(--text); outline:none; transition:border-color .2s,box-shadow .2s;
  }
  #search::placeholder { color:var(--muted); }
  #search:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,229,255,.1); }

  /* Category nav */
  .cat-nav { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:40px; }
  .cat-btn {
    display:flex; align-items:center; gap:8px; padding:8px 16px;
    border-radius:100px; border:1px solid var(--border); background:var(--surface);
    color:var(--muted); font-family:'JetBrains Mono',monospace; font-size:12px;
    cursor:pointer; transition:all .2s; white-space:nowrap;
  }
  .cat-btn:hover { border-color:var(--accent); color:var(--text); }
  .cat-btn.active { color:var(--bg); font-weight:600; }
  .cat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  /* Categories */
  .categories { display:flex; flex-direction:column; gap:48px; }
  .category { animation:fadeUp 0.4s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .cat-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
  .cat-line { height:2px; flex:1; border-radius:2px; opacity:.3; }
  .cat-title { font-size:11px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; font-family:'JetBrains Mono',monospace; }
  .cat-count { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); background:var(--surface2); border:1px solid var(--border); border-radius:100px; padding:2px 10px; }

  /* ── Grid: align-items:start prevents cross-column height bleeding ── */
  .commands-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(340px,1fr));
    gap:12px;
    align-items:start;
  }

  /* Command card */
  .cmd-card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    overflow:hidden; cursor:pointer;
    transition:border-color .2s, box-shadow .2s;
  }
  .cmd-card:hover { box-shadow:0 6px 24px rgba(0,0,0,.5); }
  .cmd-card.open  { border-color:var(--cat-color,var(--accent)); }

  .cmd-header {
    display:flex; align-items:flex-start; justify-content:space-between;
    padding:16px; gap:12px; user-select:none;
  }
  .cmd-name-wrap { flex:1; min-width:0; }
  .cmd-name {
    font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700; color:var(--text);
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }
  .cmd-badge { display:inline-block; width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:2px; }
  .cmd-desc { font-size:12px; color:var(--muted); margin-top:6px; line-height:1.5; font-family:'JetBrains Mono',monospace; }

  .toggle-icon { color:var(--muted); font-size:22px; line-height:1; font-weight:300; transition:transform .3s; flex-shrink:0; margin-top:2px; }
  .cmd-card.open .toggle-icon { transform:rotate(45deg); color:var(--accent); }

  .cmd-body { max-height:0; overflow:hidden; transition:max-height .35s ease; }
  .cmd-body-inner { border-top:1px solid var(--border); padding:16px; display:flex; flex-direction:column; gap:14px; }

  .cmd-section-label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }

  .cmd-code {
    font-family:'JetBrains Mono',monospace; font-size:12px;
    background:var(--code-bg); border:1px solid var(--border); border-radius:8px;
    padding:10px 14px; color:var(--accent3);
    display:flex; align-items:center; justify-content:space-between; gap:8px;
    overflow-x:auto; white-space:nowrap;
  }

  .copy-btn {
    flex-shrink:0; background:none; border:1px solid var(--border); border-radius:6px;
    padding:4px 10px; font-family:'JetBrains Mono',monospace; font-size:10px;
    color:var(--muted); cursor:pointer; transition:all .2s;
  }
  .copy-btn:hover  { border-color:var(--accent); color:var(--accent); }
  .copy-btn.copied { border-color:var(--accent3); color:var(--accent3); }

  /* Explanation */
  .cmd-explanation { font-size:13px; line-height:1.7; }
  .exp-simple { color:var(--text); opacity:.9; margin-bottom:10px; }
  .exp-scenario-label { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .exp-scenario {
    background:rgba(168,255,120,0.05); border-left:3px solid var(--accent3);
    border-radius:0 6px 6px 0; padding:10px 14px;
    font-family:'JetBrains Mono',monospace; font-size:11.5px; color:#c8ffa0;
    line-height:1.7; margin-bottom:12px; white-space:pre-wrap; overflow-x:auto;
  }
  .exp-link {
    display:inline-flex; align-items:center; gap:6px;
    font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--accent);
    text-decoration:none; border-bottom:1px dashed rgba(0,229,255,.4);
    padding-bottom:1px; transition:color .2s, border-color .2s;
  }
  .exp-link:hover { color:#7df3ff; border-color:rgba(0,229,255,.8); }

  /* Empty */
  .empty { text-align:center; padding:80px 24px; color:var(--muted); font-family:'JetBrains Mono',monospace; display:none; }
  .empty.visible { display:block; }
  .empty-icon { font-size:48px; margin-bottom:16px; }
  .empty p { font-size:14px; }

  /* Footer */
  footer { position:relative; z-index:10; text-align:center; padding:32px 24px; border-top:1px solid var(--border); font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); }
  footer span { color:var(--accent2); }

  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background:var(--muted); }

  @media(max-width:640px){
    .commands-grid { grid-template-columns:1fr; }
    .stats-bar { gap:24px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Back nav -->
<div style="position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:52px;background:rgba(10,12,16,0.85);backdrop-filter:blur(12px);border-bottom:1px solid #1e2535;">

    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    DevSheets Home

  <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#1e2535;letter-spacing:0.1em;text-transform:uppercase;">Git Cheatsheet</span>

<header style="padding-top:100px;">
  <div class="header-badge">Interactive Reference</div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-num">27</div><div class="stat-label">Commands</div></div>
    <div class="stat"><div class="stat-num">6</div><div class="stat-label">Categories</div></div>
    <div class="stat"><div class="stat-num">∞</div><div class="stat-label">Power</div></div>
  </div>
</header>

<main>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="search" type="text" placeholder="Search commands... (e.g. merge, push, stash)" autocomplete="off" spellcheck="false">
  </div>

  <div class="cat-nav" id="catNav">
    <button class="cat-btn active" data-cat="all"          ><span class="cat-dot" style="background:#00e5ff"></span>All</button>
    <button class="cat-btn"        data-cat="Basics"       ><span class="cat-dot" style="background:#00e5ff"></span>Basics</button>
    <button class="cat-btn"        data-cat="Branches"     ><span class="cat-dot" style="background:#a855f7"></span>Branches</button>
    <button class="cat-btn"        data-cat="History"      ><span class="cat-dot" style="background:#f59e0b"></span>History</button>
    <button class="cat-btn"        data-cat="Remote Repos" ><span class="cat-dot" style="background:#10b981"></span>Remote</button>
    <button class="cat-btn"        data-cat="Undoing"      ><span class="cat-dot" style="background:#ef4444"></span>Undoing</button>
    <button class="cat-btn"        data-cat="Advanced"     ><span class="cat-dot" style="background:#ff6b35"></span>Advanced</button>
  </div>

  <div class="categories" id="categories"></div>
  <div class="empty" id="empty">
    <div class="empty-icon">⌀</div>
    <p>No commands match "<span id="emptyTerm"></span>"</p>
  </div>
</main>

<footer>Built for developers who love the terminal &nbsp;·&nbsp; <span>git commit -m "learn everything"</span></footer>

<script>

  'all':'#00e5ff','Basics':'#00e5ff','Branches':'#a855f7',

};

  {
    category:"Basics", color:"#00e5ff",
    commands:[
      {
        name:"git init", description:"Start a brand-new Git repository",
        usage:"git init", example:"git init",

        docs:"https://git-scm.com/docs/git-init"

      {
        name:"git status", description:"See what files have changed",
        usage:"git status", example:"git status",
        simple:"Shows which files are new, edited, or staged. Think of it as asking Git \"what's going on right now?\"",
        scenario:"# Edit a file, then check what changed:\ngit status\n# Output: modified: index.html\n# → tells you what needs to be staged",
        docs:"https://git-scm.com/docs/git-status"
      },
      {
        name:"git add", description:"Stage files ready for your next commit",
        usage:"git add &lt;file&gt;  |  git add .", example:"git add index.html",
        simple:"Puts changes in a \"waiting room\" before you save them permanently. Use <code style='color:var(--accent3)'>git add .</code> to stage everything at once.",
        scenario:"# Stage one specific file:\ngit add index.html\n\n# Stage ALL changed files:\ngit add .",
        docs:"https://git-scm.com/docs/git-add"
      },
      {
        name:"git commit", description:"Save your staged changes as a snapshot",
        usage:'git commit -m "your message"', example:'git commit -m "Fix login bug"',
        simple:"Creates a permanent save-point of your staged changes. Always write a short, clear message about WHAT you changed.",
        scenario:'# After staging files with git add:\ngit commit -m "Add navbar to homepage"\n# ✓ A new save-point is created',
        docs:"https://git-scm.com/docs/git-commit"
      },
      {
        name:"git config", description:"Set your Git name, email & preferences",
        usage:"git config --global &lt;key&gt; &lt;value&gt;", example:'git config --global user.name "Ada Lovelace"',
        simple:"Tells Git who you are. Do this once after installing Git on a new computer — every commit will carry your name.",
        scenario:'# Run once on a new machine:\ngit config --global user.name "Ada Lovelace"\ngit config --global user.email "ada@email.com"',
        docs:"https://git-scm.com/docs/git-config"
      },
      {
        name:"git help", description:"Open the manual for any command",
        usage:"git help &lt;command&gt;", example:"git help commit",
        simple:"Opens the full documentation for any Git command. Great when you forget a flag or option.",

        docs:"https://git-scm.com/docs/git-help"
      }
    ]
  },
  {
    category:"Branches", color:"#a855f7",
    commands:[
      {
        name:"git branch", description:"List, create, or delete branches",
        usage:"git branch [name]  |  git branch -d &lt;n&gt;", example:"git branch feature-login",
        simple:"Branches let you work on features without touching the main code — like a safe copy of your project to experiment in.",
        scenario:"# See all branches:\ngit branch\n\n# Create a new branch (you stay on current):\ngit branch feature-login",
        docs:"https://git-scm.com/docs/git-branch"
      },
      {
        name:"git checkout", description:"Switch to a branch or create a new one",
        usage:"git checkout &lt;branch&gt;  |  git checkout -b &lt;new&gt;", example:"git checkout -b feature-login",

        docs:"https://git-scm.com/docs/git-checkout"

      {
        name:"git merge", description:"Bring another branch's changes into yours",

      {

        simple:"Downloads the latest remote changes but does NOT merge them. Use it to safely preview what's new before merging.",

        docs:"https://git-scm.com/docs/git-fetch"
      }
    ]
  },
  {
    category:"Undoing", color:"#ef4444",
    commands:[
      {
        name:"git restore", description:"Undo file edits or unstage a file",
        usage:"git restore &lt;file&gt;  |  git restore --staged &lt;file&gt;", example:"git restore --staged index.html",
        simple:"Reverts a file to its last committed state. Add <code style='color:var(--accent3)'>--staged</code> to just remove it from staging while keeping your edits.",
        scenario:"# Discard ALL edits to a file:\ngit restore index.html\n\n# Unstage a file (keep your edits):\ngit restore --staged index.html",
        docs:"https://git-scm.com/docs/git-restore"
      },
      {
        name:"git reset", description:"Rewind your branch to an earlier commit",
        usage:"git reset [--soft | --mixed | --hard] &lt;commit&gt;", example:"git reset --hard HEAD~1",
        simple:"Moves your branch pointer back in time. <strong style='color:#fca5a5'>--hard deletes your changes permanently</strong> — use with care!",
        scenario:"# Undo last commit, KEEP edits staged:\ngit reset --soft HEAD~1\n\n# Undo last commit, unstage edits:\ngit reset HEAD~1\n\n# Undo last commit + DELETE edits:\ngit reset --hard HEAD~1",
        docs:"https://git-scm.com/docs/git-reset"
      },
      {
        name:"git revert", description:"Safely undo a commit with a new one",
        usage:"git revert &lt;commit&gt;", example:"git revert HEAD",
        simple:"Creates a new commit that cancels a previous one — without rewriting history. The safe choice on shared/public branches.",
        scenario:"# Undo the latest commit safely:\ngit revert HEAD\n\n# Undo a specific older commit:\ngit revert a3f9c12\n# ✓ A new 'revert' commit is added",
        docs:"https://git-scm.com/docs/git-revert"
      }
    ]
  },
  {
    category:"Advanced", color:"#ff6b35",
    commands:[
      {
        name:"git rebase", description:"Replay your commits onto a newer base",
        usage:"git rebase &lt;base&gt;", example:"git rebase main",
        simple:"Moves your commits on top of the latest main branch, giving you a clean straight history instead of a tangled merge.",
        scenario:"# Your feature is behind main — rebase instead of merge:\ngit switch feature-login\ngit rebase main\n# ✓ Your commits now appear after main's latest",
        docs:"https://git-scm.com/docs/git-rebase"
      },
      {
        name:"git stash", description:"Save unfinished work and come back later",
        usage:"git stash  |  git stash pop", example:"git stash",
        simple:"Hides your work-in-progress so you can switch branches cleanly. Use <code style='color:var(--accent3)'>pop</code> to bring it back when ready.",
        scenario:"# Mid-feature, urgent bug fix needed:\ngit stash            # hide WIP\ngit switch main      # fix the bug\ngit switch feature-login\ngit stash pop        # ✓ WIP is back",
        docs:"https://git-scm.com/docs/git-stash"
      },
      {
        name:"git tag", description:"Label a commit as a version release",
        usage:"git tag [name]  |  git tag -a v1.0 -m \"msg\"", example:"git tag v1.0.0",
        simple:"Puts a permanent label (like v1.0.0) on a specific commit. Used to mark official release points.",
        scenario:"# Tag the current commit:\ngit tag v1.0.0\n\n# Annotated tag with a message:\ngit tag -a v1.0.0 -m \"First stable release\"\n\n# Push tags to GitHub:\ngit push origin --tags",
        docs:"https://git-scm.com/docs/git-tag"
      },
      {
        name:"git cherry-pick", description:"Copy one specific commit to your branch",
        usage:"git cherry-pick &lt;commit-hash&gt;", example:"git cherry-pick abc123",
        simple:"Applies a single commit from any branch to your current branch — without merging everything else from that branch.",
        scenario:"# Teammate fixed a bug on their branch.\n# Copy just that fix to main:\ngit switch main\ngit cherry-pick abc123\n# ✓ Only that commit is copied",
        docs:"https://git-scm.com/docs/git-cherry-pick"
      },
      {
        name:"git bisect", description:"Find which commit introduced a bug",
        usage:"git bisect start  → mark good / bad", example:"git bisect start",
        simple:"Git binary-searches through your history to pinpoint exactly when a bug was introduced. Way faster than checking commits manually.",
        scenario:"git bisect start\ngit bisect bad          # now = broken\ngit bisect good v1.0    # v1.0 = working\n# Git checks out a middle commit;\n# you test, type 'good' or 'bad'\n# Repeat — Git finds the culprit commit.",
        docs:"https://git-scm.com/docs/git-bisect"
      }
    ]
  }
];

/* ── State ── */
let openCard  = null;
let searchVal = '';
let catVal    = 'all';

/* ── Accordion helpers ── */
function closeCard(card) {
  if (!card) return;
  card.classList.remove('open');
  card.querySelector('.cmd-body').style.maxHeight = '0';
  openCard = null;
}
function openCardEl(card) {
  card.classList.add('open');
  const body = card.querySelector('.cmd-body');
  body.style.maxHeight = body.scrollHeight + 'px';
  openCard = card;
}

/* ── Render ── */
function render(filter, catFilter) {
  const container = document.getElementById('categories');
  const empty     = document.getElementById('empty');
  openCard = null;
  container.innerHTML = '';

  const filtered = data
    .filter(cat => catFilter === 'all' || cat.category === catFilter)
    .map(cat => ({
      ...cat,
      commands: cat.commands.filter(cmd =>
        !filter ||
        cmd.name.toLowerCase().includes(filter) ||
        cmd.description.toLowerCase().includes(filter) ||
        cmd.simple.toLowerCase().includes(filter)
      )
    }))
    .filter(cat => cat.commands.length > 0);

  let total = 0;
  filtered.forEach((cat, ci) => {
    total += cat.commands.length;
    const section = document.createElement('div');
    section.className = 'category';
    section.style.animationDelay = (ci * 0.05) + 's';
    section.innerHTML = `
      <div class="cat-header">
        <span class="cat-title" style="color:${cat.color}">${cat.category}</span>
        <div class="cat-line" style="background:${cat.color}"></div>
        <span class="cat-count">${cat.commands.length}</span>
      </div>
      <div class="commands-grid">
        ${cat.commands.map(cmd => `
          <div class="cmd-card" style="--cat-color:${cat.color}">
            <div class="cmd-header">
              <div class="cmd-name-wrap">
                <div class="cmd-name">
                  <span class="cmd-badge" style="background:${cat.color}"></span>${cmd.name}
                </div>
                <div class="cmd-desc">${cmd.description}</div>
              </div>
              <span class="toggle-icon">+</span>
            </div>
            <div class="cmd-body">
              <div class="cmd-body-inner">
                <div>
                  <div class="cmd-section-label">Usage</div>
                  <div class="cmd-code">
                    <span>${cmd.usage}</span>
                    <button class="copy-btn" data-copy="${cmd.usage.replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/"/g,'&quot;')}">copy</button>
                  </div>
                </div>
                <div>
                  <div class="cmd-section-label">Example</div>
                  <div class="cmd-code">
                    <span>${cmd.example}</span>
                    <button class="copy-btn" data-copy="${cmd.example.replace(/"/g,'&quot;')}">copy</button>
                  </div>
                </div>
                <div class="cmd-explanation">
                  <div class="cmd-section-label">What it does</div>
                  <p class="exp-simple">${cmd.simple}</p>
                  <div class="exp-scenario-label">Real-world example</div>
                  <pre class="exp-scenario">${cmd.scenario}</pre>
                  <a class="exp-link" href="${cmd.docs}" target="_blank" rel="noopener">
                    ${LINK_SVG}&nbsp;Official docs → ${cmd.name}
                  </a>
                </div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>`;
    container.appendChild(section);
  });

  if (total === 0) {
    empty.classList.add('visible');
    document.getElementById('emptyTerm').textContent = filter;
    container.style.display = 'none';
  } else {
    empty.classList.remove('visible');
    container.style.display = 'flex';
  }

  /* Card clicks — only ONE open at a time */
  document.querySelectorAll('.cmd-card').forEach(card => {
    card.querySelector('.cmd-header').addEventListener('click', () => {
      if (card === openCard) { closeCard(card); }
      else { closeCard(openCard); openCardEl(card); }
    });
  });

  /* Copy buttons */
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      navigator.clipboard.writeText(btn.dataset.copy).then(() => {
        btn.textContent = '✓ done';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 1500);
      });
    });
  });
}

/* ── Search ── */
document.getElementById('search').addEventListener('input', e => {
  searchVal = e.target.value.toLowerCase().trim();
  render(searchVal, catVal);
});

/* ── Category filter ── */
document.getElementById('catNav').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '';
    b.style.borderColor = '';
    b.style.color = '';
  });
  btn.classList.add('active');
  catVal = btn.dataset.cat;
  const col = CAT_COLORS[catVal] || '#00e5ff';
  btn.style.background  = col;
  btn.style.borderColor = col;
  btn.style.color       = '#0a0c10';
  render(searchVal, catVal);
});

render(searchVal, catVal);
</script>
